<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancher - Minimalist Marketplace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <h1>Freelancher</h1>
                <p>Minimalist Freelancer Marketplace</p>
            </div>
            <nav id="user-nav">
                <button id="btn-login" class="btn-text">Login</button>
                <button id="btn-register" class="btn">Register</button>
                <div id="user-info" style="display: none;">
                    <span id="username-display"></span> (<span id="role-display"></span>)
                    <button id="btn-logout" class="btn-text">Logout</button>
                </div>
            </nav>
        </div>
    </header>

    <div class="view-selector container">
        <button id="view-freelancers" class="view-btn active">Find Freelancers</button>
        <button id="view-jobs" class="view-btn">Browse Jobs</button>
        <button id="btn-post-job" class="btn" style="display: none; margin-left: auto;">Post a Job</button>
    </div>

    <main class="container">
        <aside id="sidebar">
            <h3>Categories</h3>
            <ul id="category-list">
                <!-- Categories will be loaded here -->
            </ul>
        </aside>

        <section id="content">
            <h2 id="section-title">Freelancers</h2>
            <div id="main-grid" class="grid">
                <!-- Content will be loaded here -->
            </div>
        </section>
    </main>

    <!-- Modal for Auth -->
    <div id="auth-modal" class="modal">
        <div class="modal-content auth-content">
            <span class="close-auth close">&times;</span>
            <div id="login-form-div">
                <h2>Login</h2>
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn btn-full">Login</button>
                    <p class="auth-toggle">Don't have an account? <a href="#" id="go-to-register">Register</a></p>
                </form>
            </div>
            <div id="register-form-div" style="display: none;">
                <h2>Register</h2>
                <form id="register-form">
                    <input type="text" id="reg-username" placeholder="Username" required>
                    <input type="password" id="reg-password" placeholder="Password" required>
                    <select id="reg-role" required>
                        <option value="Freelancer">I am a Freelancer</option>
                        <option value="Client">I am a Client</option>
                    </select>
                    <div id="freelancer-fields">
                        <select id="reg-category">
                            <option value="">Select Category</option>
                            <!-- Will be populated -->
                        </select>
                        <input type="number" id="reg-experience" placeholder="Years of Experience">
                        <textarea id="reg-bio" placeholder="Bio"></textarea>
                    </div>
                    <button type="submit" class="btn btn-full">Register</button>
                    <p class="auth-toggle">Already have an account? <a href="#" id="go-to-login">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal for Detail / Forms -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal close">&times;</span>
            <div id="modal-body">
                <!-- Detail content or forms will be loaded here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
